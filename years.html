<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live English عبر السنوات</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
  <style>
    .page-hero {
      background: linear-gradient(135deg, #1a1a2e 0%, var(--secondary) 100%);
      padding: 60px 0 48px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .page-hero::before {
      content:'';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 60% at 50% 100%, rgba(251,199,13,.18) 0%, transparent 65%);
    }
    .page-hero h1 { color: #fff; font-weight: 900; font-size: 2.2rem; position: relative; }
    .page-hero p  { color: rgba(255,255,255,.7); position: relative; }

    /* Year cards */
    .year-card {
      background: var(--white);
      border-radius: var(--radius);
      border: 2px solid transparent;
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      cursor: pointer;
      transition: .25s;
    }
    .year-card:hover {
      border-color: var(--primary);
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }
    .year-card.active {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(251,199,13,.2);
    }
    .year-card .year-header {
      background: linear-gradient(135deg, var(--secondary), var(--text-dark));
      padding: 28px 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .year-card .year-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 120%, rgba(251,199,13,.2) 0%, transparent 60%);
    }
    .year-card .year-num {
      font-size: 3rem;
      font-weight: 900;
      color: var(--primary);
      position: relative;
    }
    .year-card .year-title {
      color: rgba(255,255,255,.8);
      font-size: 14px;
      position: relative;
    }
    .year-card .year-body { padding: 16px 20px; }
    .year-card .year-stat {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .year-card .year-stat i { color: var(--primary); width: 16px; }

    /* Detail panel */
    .year-detail {
      display: none;
      animation: fadeSlideIn .3s ease;
    }
    .year-detail.show { display: block; }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Gallery */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
    }
    .gallery-thumb {
      aspect-ratio: 1;
      border-radius: var(--radius-sm);
      object-fit: cover;
      width: 100%;
      cursor: pointer;
      transition: .2s;
      background: var(--bg-light);
    }
    .gallery-thumb:hover { opacity: .82; transform: scale(1.03); }

    /* YouTube embed */
    .yt-embed {
      aspect-ratio: 16/9;
      width: 100%;
      border-radius: var(--radius-sm);
      border: none;
      background: #000;
    }

    /* Lightbox */
    .lightbox-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.92);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
    }
    .lightbox-overlay.active { opacity: 1; pointer-events: all; }
    .lightbox-overlay img { max-width: 90vw; max-height: 88vh; object-fit: contain; border-radius: var(--radius); }
    .lightbox-close {
      position: absolute; top: 16px; left: 20px;
      color: #fff; font-size: 28px; cursor: pointer;
      background: rgba(255,255,255,.1); border: none;
      width: 44px; height: 44px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .lightbox-close:hover { background: rgba(255,255,255,.2); }
    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,.1);
      border: none; color: #fff;
      width: 48px; height: 48px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: .2s;
    }
    .lightbox-nav:hover { background: rgba(255,255,255,.2); }
    .lightbox-nav.prev { right: 20px; }
    .lightbox-nav.next { left: 20px; }

    /* Skeleton */
    .skeleton-box {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: skeleton-shimmer 1.5s infinite;
      border-radius: var(--radius);
    }
    @keyframes skeleton-shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .tab-pill {
      padding: 6px 16px;
      border-radius: 50px;
      border: 2px solid var(--border-color);
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      background: var(--white);
      color: var(--text-muted);
      transition: .2s;
    }
    .tab-pill.active {
      background: var(--primary);
      color: var(--text-dark);
      border-color: var(--primary);
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar-le d-flex justify-content-between align-items-center">
  <div class="brand">
    <a href="index.html" style="color:inherit;text-decoration:none;display:flex;align-items:center;gap:10px;">
      <i class="fa-solid fa-globe-americas" style="color:var(--primary)"></i>
      Live English
    </a>
  </div>
  <div class="d-flex align-items-center gap-2">
    <a href="index.html" class="btn btn-sm btn-outline-secondary">الرئيسية</a>
    <a href="register.html" class="btn btn-sm" style="background:var(--primary);color:var(--text-dark);font-weight:700;border-radius:50px;padding:7px 18px;">
      سجّل الآن
    </a>
  </div>
</nav>

<!-- Hero -->
<div class="page-hero">
  <div class="container position-relative">
    <div class="badge mb-3" style="background:rgba(251,199,13,.2);color:var(--primary);padding:6px 14px;font-size:13px;">
      <i class="fa fa-clock-rotate-left me-1"></i> ذاكرتنا المشتركة
    </div>
    <h1>Live English عبر السنوات</h1>
    <p class="mt-2">استعد ذكريات البرنامج وشاهد لحظات لا تُنسى من سنوات ماضية</p>
  </div>
</div>

<div class="container py-5">
  <!-- Skeletons -->
  <div id="years-skeleton" class="row g-4">
    <div class="col-6 col-md-3"><div class="skeleton-box" style="height:220px"></div></div>
    <div class="col-6 col-md-3"><div class="skeleton-box" style="height:220px"></div></div>
    <div class="col-6 col-md-3"><div class="skeleton-box" style="height:220px"></div></div>
    <div class="col-6 col-md-3"><div class="skeleton-box" style="height:220px"></div></div>
  </div>

  <!-- Year cards -->
  <div id="years-grid" class="row g-3 mb-5" style="display:none!important"></div>

  <!-- Year detail -->
  <div id="year-detail-panel" class="year-detail">
    <div class="d-flex align-items-center gap-3 mb-4">
      <button class="btn btn-sm btn-outline-secondary" onclick="closeDetail()">
        <i class="fa fa-arrow-right me-1"></i> عودة
      </button>
      <h4 class="mb-0 fw-800" id="detail-year-title">—</h4>
    </div>

    <!-- Stats bar -->
    <div class="row g-3 mb-4" id="detail-stats"></div>

    <!-- Description -->
    <div id="detail-desc" class="kpi-card mb-4" style="display:none">
      <p class="mb-0" id="detail-desc-text"></p>
    </div>

    <!-- Tabs -->
    <div class="d-flex flex-wrap gap-2 mb-4" id="detail-tabs">
      <button class="tab-pill active" onclick="switchTab('videos',this)">
        <i class="fa fa-play-circle me-1"></i> الفيديوهات
      </button>
      <button class="tab-pill" onclick="switchTab('photos',this)">
        <i class="fa fa-images me-1"></i> الصور
      </button>
      <button class="tab-pill" onclick="switchTab('highlights',this)">
        <i class="fa fa-star me-1"></i> أبرز الأنشطة
      </button>
    </div>

    <!-- Videos tab -->
    <div id="tab-videos">
      <div class="row g-3" id="detail-videos"></div>
      <div id="no-videos" class="text-center py-4 text-muted" style="display:none">
        <i class="fa fa-film fa-2x mb-2"></i><br>لا توجد فيديوهات
      </div>
    </div>

    <!-- Photos tab -->
    <div id="tab-photos" style="display:none">
      <div class="gallery-grid" id="detail-gallery"></div>
      <div id="no-photos" class="text-center py-4 text-muted" style="display:none">
        <i class="fa fa-images fa-2x mb-2"></i><br>لا توجد صور
      </div>
    </div>

    <!-- Highlights tab -->
    <div id="tab-highlights" style="display:none">
      <div id="detail-highlights-list"></div>
      <div id="no-highlights" class="text-center py-4 text-muted" style="display:none">
        <i class="fa fa-star fa-2x mb-2"></i><br>لا توجد معلومات
      </div>
    </div>
  </div>

  <!-- Empty -->
  <div id="years-empty" class="text-center py-5" style="display:none">
    <i class="fa fa-clock-rotate-left fa-3x text-muted mb-3"></i>
    <h5 class="text-muted">لا توجد سنوات مضافة بعد</h5>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox-overlay" id="lightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" onclick="closeLightbox()"><i class="fa fa-times"></i></button>
  <button class="lightbox-nav prev" onclick="lightboxNav(1,event)"><i class="fa fa-angle-right"></i></button>
  <img src="" id="lightbox-img" alt="">
  <button class="lightbox-nav next" onclick="lightboxNav(-1,event)"><i class="fa fa-angle-left"></i></button>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/api.js"></script>
<script>
  let allYears = [];
  let currentYear = null;
  let galleryImages = [];
  let lightboxIndex = 0;

  document.addEventListener('DOMContentLoaded', loadYears);

  async function loadYears() {
    try {
      const data = await API.get('getYears');
      allYears = (data && data.years) ? data.years.filter(y => y.visible !== false) : [];
      document.getElementById('years-skeleton').style.display = 'none';
      if (!allYears.length) {
        document.getElementById('years-empty').style.display = 'block';
        return;
      }
      const grid = document.getElementById('years-grid');
      grid.style.removeProperty('display');
      grid.innerHTML = allYears.map(y => renderYearCard(y)).join('');
    } catch (e) {
      document.getElementById('years-skeleton').style.display = 'none';
      document.getElementById('years-empty').style.display = 'block';
    }
  }

  function renderYearCard(y) {
    return `
      <div class="col-6 col-md-3">
        <div class="year-card" onclick="openYear('${y.year}')">
          <div class="year-header">
            <div class="year-num">${y.year}</div>
            ${y.title ? `<div class="year-title">${y.title}</div>` : ''}
          </div>
          <div class="year-body">
            ${y.participants ? `<div class="year-stat"><i class="fa fa-users"></i> ${y.participants} مشارك</div>` : ''}
            ${y.videos && y.videos.length ? `<div class="year-stat"><i class="fa fa-play-circle"></i> ${y.videos.length} فيديو</div>` : ''}
          </div>
        </div>
      </div>
    `;
  }

  function openYear(year) {
    currentYear = allYears.find(y => String(y.year) === String(year));
    if (!currentYear) return;

    // Update active card
    document.querySelectorAll('.year-card').forEach(c => c.classList.remove('active'));
    event.currentTarget.classList.add('active');

    // Populate detail panel
    document.getElementById('detail-year-title').textContent = `${currentYear.year}${currentYear.title ? ' — ' + currentYear.title : ''}`;

    // Stats
    const statsEl = document.getElementById('detail-stats');
    statsEl.innerHTML = '';
    if (currentYear.participants) statsEl.innerHTML += statCard('fa-users', currentYear.participants, 'مشارك');
    if (currentYear.videos && currentYear.videos.length) statsEl.innerHTML += statCard('fa-play-circle', currentYear.videos.length, 'فيديو');

    // Description
    const descEl = document.getElementById('detail-desc');
    if (currentYear.description) {
      document.getElementById('detail-desc-text').textContent = currentYear.description;
      descEl.style.display = 'block';
    } else { descEl.style.display = 'none'; }

    // Videos
    const videosEl = document.getElementById('detail-videos');
    const videos = currentYear.videos || [];
    if (videos.length) {
      videosEl.innerHTML = videos.map(v => {
        const id = extractYouTubeId(v.url || v);
        return id ? `
          <div class="col-md-6 col-lg-4">
            <iframe class="yt-embed" src="https://www.youtube.com/embed/${id}" allowfullscreen loading="lazy"></iframe>
            ${v.title ? `<div class="mt-2 text-muted small fw-600">${v.title}</div>` : ''}
          </div>` : '';
      }).join('');
      document.getElementById('no-videos').style.display = 'none';
    } else {
      videosEl.innerHTML = '';
      document.getElementById('no-videos').style.display = 'block';
    }

    // Photos from Drive folder (display as external links thumbnails)
    const galleryEl = document.getElementById('detail-gallery');
    galleryImages = currentYear.photos || [];
    if (galleryImages.length) {
      galleryEl.innerHTML = galleryImages.map((img, i) => `
        <img class="gallery-thumb" src="${img.url || img}" alt="صورة ${i+1}" loading="lazy"
             onclick="openLightbox(${i})" onerror="this.style.display='none'">
      `).join('');
      document.getElementById('no-photos').style.display = 'none';
    } else {
      galleryEl.innerHTML = '';
      document.getElementById('no-photos').style.display = 'block';
    }

    // Highlights
    const hlEl = document.getElementById('detail-highlights-list');
    const highlights = currentYear.highlights || [];
    if (highlights.length) {
      hlEl.innerHTML = `<ul class="list-group list-group-flush">` +
        highlights.map(h => `<li class="list-group-item d-flex align-items-center gap-2">
          <i class="fa fa-circle-check text-warning"></i> ${h}
        </li>`).join('') + `</ul>`;
      document.getElementById('no-highlights').style.display = 'none';
    } else {
      hlEl.innerHTML = '';
      document.getElementById('no-highlights').style.display = 'block';
    }

    // Show panel
    switchTab('videos', document.querySelector('#detail-tabs .tab-pill'));
    document.getElementById('year-detail-panel').classList.add('show');
    document.getElementById('year-detail-panel').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function statCard(icon, val, label) {
    return `<div class="col-4 col-md-3">
      <div class="kpi-card text-center py-2">
        <div style="font-size:1.6rem;font-weight:900;color:var(--primary)">${val}</div>
        <div class="text-muted small">${label}</div>
      </div>
    </div>`;
  }

  function closeDetail() {
    document.getElementById('year-detail-panel').classList.remove('show');
    document.querySelectorAll('.year-card').forEach(c => c.classList.remove('active'));
  }

  function switchTab(tab, btn) {
    ['videos','photos','highlights'].forEach(t => {
      document.getElementById('tab-' + t).style.display = t === tab ? 'block' : 'none';
    });
    document.querySelectorAll('#detail-tabs .tab-pill').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
  }

  function extractYouTubeId(url) {
    if (!url) return null;
    const m = url.match(/(?:v=|youtu\.be\/|embed\/)([A-Za-z0-9_-]{11})/);
    return m ? m[1] : null;
  }

  function openLightbox(i) {
    lightboxIndex = i;
    document.getElementById('lightbox-img').src = galleryImages[i].url || galleryImages[i];
    document.getElementById('lightbox').classList.add('active');
  }
  function closeLightbox(e) {
    if (e && e.target !== document.getElementById('lightbox') && !e.target.classList.contains('lightbox-close')) return;
    document.getElementById('lightbox').classList.remove('active');
  }
  function lightboxNav(dir, e) {
    e && e.stopPropagation();
    lightboxIndex = (lightboxIndex + dir + galleryImages.length) % galleryImages.length;
    document.getElementById('lightbox-img').src = galleryImages[lightboxIndex].url || galleryImages[lightboxIndex];
  }
  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('active')) return;
    if (e.key === 'Escape') document.getElementById('lightbox').classList.remove('active');
    if (e.key === 'ArrowRight') lightboxNav(1, null);
    if (e.key === 'ArrowLeft') lightboxNav(-1, null);
  });
</script>
</body>
</html>
