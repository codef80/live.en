<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>دخول العاملين — Live English</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #fff8e1 0%, #f3f4f6 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      background: var(--white);
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border-color);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .login-logo .logo-text {
      font-size: 32px;
      font-weight: 800;
    }
    .login-logo .logo-text span { color: var(--primary); }
    .login-logo p { color: var(--text-muted); font-size: 14px; margin-top: 6px; }
    .input-icon-wrap {
      position: relative;
    }
    .input-icon-wrap .icon {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }
    .input-icon-wrap input {
      padding-right: 40px;
    }
    .toggle-pass {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      cursor: pointer;
      background: none;
      border: none;
    }
  </style>
</head>
<body>

<div id="global-loader"><div class="spinner-le"></div></div>

<div class="login-card">
  <div class="login-logo">
    <div class="logo-text">Live <span>English</span></div>
    <p>بوابة العاملين</p>
  </div>

  <div class="form-group-le">
    <label>اسم المستخدم</label>
    <div class="input-icon-wrap">
      <i class="fa fa-user icon"></i>
      <input type="text" class="form-control-le" id="username"
             placeholder="أدخل اسم المستخدم" autocomplete="username">
    </div>
  </div>

  <div class="form-group-le">
    <label>كلمة المرور</label>
    <div class="input-icon-wrap">
      <i class="fa fa-lock icon"></i>
      <input type="password" class="form-control-le" id="password"
             placeholder="أدخل كلمة المرور" autocomplete="current-password">
      <button class="toggle-pass" type="button" onclick="togglePassword()">
        <i class="fa fa-eye" id="eye-icon"></i>
      </button>
    </div>
  </div>

  <div id="error-msg" style="display:none;background:#f8d7da;color:#842029;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:14px;text-align:center;">
    <i class="fa fa-exclamation-circle me-1"></i><span id="error-text"></span>
  </div>

  <button class="btn-le btn-primary-le w-100" id="login-btn" onclick="doLogin()">
    <i class="fa fa-sign-in-alt me-2"></i>دخول
  </button>

  <div class="text-center mt-4">
    <a href="index.html" style="font-size:13px;color:var(--text-muted);">
      <i class="fa fa-arrow-right me-1"></i>العودة للرئيسية
    </a>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.10.5/sweetalert2.all.min.js"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/api.js"></script>
<script>
// التحقق إذا مسجل مسبقاً
if (AUTH.getUser()) window.location.href = 'admin.html';

function togglePassword() {
  const input = document.getElementById('password');
  const icon  = document.getElementById('eye-icon');
  if (input.type === 'password') {
    input.type = 'text';
    icon.classList.replace('fa-eye', 'fa-eye-slash');
  } else {
    input.type = 'password';
    icon.classList.replace('fa-eye-slash', 'fa-eye');
  }
}

async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const errorBox = document.getElementById('error-msg');
  errorBox.style.display = 'none';

  if (!username || !password) {
    document.getElementById('error-text').textContent = 'يرجى إدخال اسم المستخدم وكلمة المرور';
    errorBox.style.display = 'block';
    return;
  }

  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>جارٍ التحقق...';

  try {
    const res = await API.login({ username, password });
    if (res.success) {
      AUTH.save(res.user);
      window.location.href = 'admin.html';
    } else {
      document.getElementById('error-text').textContent = res.error || 'بيانات الدخول غير صحيحة';
      errorBox.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = '<i class="fa fa-sign-in-alt me-2"></i>دخول';
    }
  } catch (e) {
    document.getElementById('error-text').textContent = 'تعذّر الاتصال بالخادم، حاول مجدداً';
    errorBox.style.display = 'block';
    btn.disabled = false;
    btn.innerHTML = '<i class="fa fa-sign-in-alt me-2"></i>دخول';
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
