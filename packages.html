<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الباقات | Live English</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
  <link href="assets/css/styles.css" rel="stylesheet">

  <style>
    .packages-page{
      padding-top:120px;
      padding-bottom:60px;
      min-height:100vh;
    }

    .packages-head{
      background:linear-gradient(145deg, rgba(255,255,255,.98), rgba(255,248,223,.95));
      border:1px solid rgba(251,199,13,.22);
      border-radius:34px;
      box-shadow:0 24px 60px rgba(88,89,91,.12);
      padding:28px;
      margin-bottom:26px;
    }

    .packages-title{
      font-size:2rem;
      font-weight:900;
      color:#58595b;
      margin-bottom:8px;
    }

    .packages-text{
      color:#6f7075;
      line-height:1.95;
      margin:0;
    }

    .package-grid-card{
      background:#fff;
      border:1px solid #efe7cf;
      border-radius:30px;
      box-shadow:0 16px 36px rgba(88,89,91,.08);
      overflow:hidden;
      height:100%;
      transition:.28s ease;
    }

    .package-grid-card:hover{
      transform:translateY(-8px);
      box-shadow:0 24px 48px rgba(88,89,91,.14);
    }

    .package-grid-cover{
      width:100%;
      aspect-ratio:16/11;
      object-fit:cover;
      background:#f8f2df;
      display:block;
      cursor:pointer;
    }

    .package-grid-body{
      padding:22px;
    }

    .package-grid-title{
      font-size:1.22rem;
      font-weight:900;
      color:#58595b;
      margin-bottom:10px;
    }

    .package-grid-desc{
      color:#6f7075;
      line-height:1.9;
      margin-bottom:18px;
      min-height:68px;
    }

    .package-grid-footer{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .package-grid-price{
      font-size:1.45rem;
      font-weight:900;
      color:#58595b;
    }

    .preview-modal-img{
      width:100%;
      border-radius:20px;
      display:block;
      background:#f8f2df;
    }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg fixed-top glass-nav">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <span class="brand-badge"><i class="fa-solid fa-language"></i></span>
        <span>Live English</span>
      </a>

      <div class="ms-auto d-flex gap-2">
        <a href="index.html" class="btn btn-le-outline">
          <i class="fa-solid fa-house"></i>
          الرئيسية
        </a>
        <a href="register.html" class="btn btn-le">
          <i class="fa-solid fa-pen-to-square"></i>
          التسجيل
        </a>
      </div>
    </div>
  </nav>

  <main class="packages-page">
    <div class="container">
      <div class="packages-head">
        <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3">
          <div>
            <div class="packages-title">الباقات</div>
            <p class="packages-text">استعرض الباقات المتاحة واختر ما يناسبك ثم انتقل مباشرة إلى التسجيل.</p>
          </div>
          <div>
            <a href="register.html" class="btn btn-le">
              <i class="fa-solid fa-arrow-left-long"></i>
              ابدأ التسجيل
            </a>
          </div>
        </div>
      </div>

      <div class="row g-4" id="packagesGrid">
        <div class="col-12">
          <div class="empty-box">جاري تحميل الباقات...</div>
        </div>
      </div>
    </div>
  </main>

  <div class="modal fade" id="imagePreviewModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content border-0" style="border-radius:28px;overflow:hidden;">
        <div class="modal-header" style="background:#fff7da;border-bottom:1px solid #eadca9;">
          <h5 class="modal-title fw-bold" id="imagePreviewTitle">صورة الباقة</h5>
          <button type="button" class="btn-close m-0 ms-auto shadow-none" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body bg-white">
          <img id="imagePreviewEl" class="preview-modal-img" src="" alt="">
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="assets/js/config.js"></script>
  <script>
    const API_URL = window.APP_CONFIG.API_URL;
    const previewModal = new bootstrap.Modal(document.getElementById('imagePreviewModal'));

    document.addEventListener('DOMContentLoaded', loadPackages);

    async function loadPackages() {
      const grid = document.getElementById('packagesGrid');

      try {
        const res = await fetch(`${API_URL}?action=getPackages`);
        const json = await res.json();
        const items = json?.data || [];

        if (!items.length) {
          grid.innerHTML = '<div class="col-12"><div class="empty-box">لا توجد باقات مفعلة حاليًا.</div></div>';
          return;
        }

        grid.innerHTML = items.map(item => `
          <div class="col-md-6 col-xl-4">
            <div class="package-grid-card">
              <img
                src="${safeImg(item.imageUrl, item.title)}"
                alt="${escapeHtml(item.title || '')}"
                class="package-grid-cover"
                onclick="openPreview('${escapeJs(safeImg(item.imageUrl, item.title))}','${escapeJs(item.title || '')}')"
              >
              <div class="package-grid-body">
                <div class="package-grid-title">${escapeHtml(item.title || '')}</div>
                <div class="package-grid-desc">${escapeHtml(item.description || '')}</div>
                <div class="package-grid-footer">
                  <div class="package-grid-price">${Number(item.price || 0).toLocaleString('en-US')} ر.س</div>
                  <a href="register.html" class="btn btn-le ${item.registerEnabled ? '' : 'disabled'}">
                    <i class="fa-solid fa-arrow-left-long"></i>
                    التسجيل
                  </a>
                </div>
              </div>
            </div>
          </div>
        `).join('');
      } catch (e) {
        console.error(e);
        grid.innerHTML = '<div class="col-12"><div class="empty-box">تعذر تحميل الباقات حاليًا.</div></div>';
      }
    }

    function openPreview(src, title) {
      document.getElementById('imagePreviewEl').src = src;
      document.getElementById('imagePreviewTitle').textContent = title || 'صورة الباقة';
      previewModal.show();
    }

    function safeImg(url, text) {
      return url || `https://placehold.co/900x620/f8f1db/58595b?text=${encodeURIComponent(text || 'Live English')}`;
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function escapeJs(value) {
      return String(value ?? '').replace(/'/g, "\\'");
    }
  </script>
</body>
</html>
