<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الباقات — Live English</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
  <style>
    .page-hero {
      background: linear-gradient(135deg, var(--secondary) 0%, var(--text-dark) 100%);
      padding: 60px 0 48px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .page-hero::before {
      content:'';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 80% at 50% 100%, rgba(251,199,13,.15) 0%, transparent 70%);
    }
    .page-hero h1 { color: #fff; font-weight: 900; font-size: 2.2rem; position: relative; }
    .page-hero p  { color: rgba(255,255,255,.7); position: relative; }

    /* Package cards */
    .pkg-card {
      background: var(--white);
      border-radius: var(--radius);
      border: 2px solid var(--border-color);
      overflow: hidden;
      transition: transform .25s, box-shadow .25s, border-color .25s;
      cursor: pointer;
    }
    .pkg-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 40px rgba(0,0,0,.12);
      border-color: var(--primary);
    }
    .pkg-card .pkg-img {
      width: 100%;
      aspect-ratio: 4/5;
      object-fit: cover;
      background: var(--bg-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
      color: var(--primary-light);
      position: relative;
      overflow: hidden;
    }
    .pkg-card .pkg-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .pkg-card .pkg-img .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.4);
      opacity: 0;
      transition: .25s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pkg-card:hover .pkg-img .overlay { opacity: 1; }
    .pkg-card .pkg-img .overlay i { color: #fff; font-size: 36px; }
    .pkg-card .pkg-body { padding: 20px; }
    .pkg-card .pkg-title { font-weight: 800; font-size: 17px; color: var(--text-dark); margin-bottom: 4px; }
    .pkg-card .pkg-meta { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; }
    .pkg-card .pkg-price {
      font-size: 22px;
      font-weight: 900;
      color: var(--secondary);
    }
    .pkg-card .pkg-price span { font-size: 14px; font-weight: 400; color: var(--text-muted); }
    .btn-register-pkg {
      display: block;
      width: 100%;
      background: var(--primary);
      color: var(--text-dark);
      font-weight: 700;
      padding: 12px;
      border-radius: var(--radius-sm);
      border: none;
      font-size: 15px;
      transition: .2s;
      text-align: center;
      margin-top: 14px;
    }
    .btn-register-pkg:hover { background: #e8b40a; color: var(--text-dark); }
    .btn-register-pkg.disabled {
      background: var(--bg-light);
      color: var(--text-muted);
      cursor: not-allowed;
    }
    /* Lightbox */
    .lightbox-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.92);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
    }
    .lightbox-overlay.active { opacity: 1; pointer-events: all; }
    .lightbox-overlay img {
      max-width: 90vw;
      max-height: 88vh;
      border-radius: var(--radius);
      box-shadow: 0 20px 60px rgba(0,0,0,.6);
      object-fit: contain;
    }
    .lightbox-close {
      position: absolute;
      top: 16px;
      left: 20px;
      color: #fff;
      font-size: 28px;
      cursor: pointer;
      background: rgba(255,255,255,.1);
      border: none;
      width: 44px; height: 44px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .lightbox-close:hover { background: rgba(255,255,255,.2); }
    /* Skeleton */
    .skeleton-box {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: skeleton-shimmer 1.5s infinite;
      border-radius: var(--radius-sm);
    }
    @keyframes skeleton-shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .skeleton-card { height: 380px; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar-le d-flex justify-content-between align-items-center">
  <div class="brand">
    <a href="index.html" style="color:inherit;text-decoration:none;display:flex;align-items:center;gap:10px;">
      <i class="fa-solid fa-globe-americas" style="color:var(--primary)"></i>
      Live English
    </a>
  </div>
  <div class="d-flex align-items-center gap-2">
    <a href="index.html" class="btn btn-sm btn-outline-secondary">الرئيسية</a>
    <a href="register.html" class="btn btn-sm" style="background:var(--primary);color:var(--text-dark);font-weight:700;border-radius:50px;padding:7px 18px;">
      سجّل الآن
    </a>
  </div>
</nav>

<!-- Hero -->
<div class="page-hero">
  <div class="container position-relative">
    <div class="badge mb-3" style="background:rgba(251,199,13,.2);color:var(--primary);padding:6px 14px;font-size:13px;">
      <i class="fa fa-box-open me-1"></i> باقات البرنامج
    </div>
    <h1>اختر الباقة المناسبة لك</h1>
    <p class="mt-2">اضغط على أي باقة لمشاهدة تفاصيلها كاملة</p>
  </div>
</div>

<!-- Content -->
<div class="container py-5">
  <!-- loading skeletons -->
  <div class="row g-4" id="packages-skeleton">
    <div class="col-sm-6 col-lg-4"><div class="skeleton-box skeleton-card"></div></div>
    <div class="col-sm-6 col-lg-4"><div class="skeleton-box skeleton-card"></div></div>
    <div class="col-sm-6 col-lg-4"><div class="skeleton-box skeleton-card"></div></div>
  </div>
  <!-- packages grid -->
  <div class="row g-4" id="packages-grid" style="display:none!important"></div>
  <!-- empty -->
  <div id="packages-empty" class="text-center py-5" style="display:none">
    <i class="fa fa-box-open fa-3x text-muted mb-3"></i>
    <h5 class="text-muted">لا توجد باقات متاحة حالياً</h5>
    <p class="text-muted small">سيتم الإعلان عن الباقات قريبًا</p>
  </div>
</div>

<!-- CTA -->
<div class="py-4 text-center" style="background:var(--primary-soft);border-top:2px solid var(--primary-light)">
  <p class="mb-2 fw-600">هل لديك استفسار عن الباقات؟</p>
  <a href="register.html" class="btn" style="background:var(--primary);color:var(--text-dark);font-weight:700;border-radius:50px;padding:10px 28px;">
    تسجيل مباشر <i class="fa fa-arrow-left ms-1"></i>
  </a>
</div>

<!-- Lightbox -->
<div class="lightbox-overlay" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()"><i class="fa fa-times"></i></button>
  <img src="" id="lightbox-img" alt="صورة الباقة">
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/api.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', loadPackages);

  async function loadPackages() {
    try {
      const data = await API.get('getPackages');
      const packages = (data && data.packages) ? data.packages.filter(p => p.visible !== false) : [];
      document.getElementById('packages-skeleton').style.display = 'none';
      if (!packages.length) {
        document.getElementById('packages-empty').style.display = 'block';
        return;
      }
      const grid = document.getElementById('packages-grid');
      grid.style.removeProperty('display');
      grid.innerHTML = packages.map(pkg => renderPkgCard(pkg)).join('');
    } catch (e) {
      document.getElementById('packages-skeleton').style.display = 'none';
      document.getElementById('packages-empty').style.display = 'block';
    }
  }

  function renderPkgCard(pkg) {
    const hasImg = pkg.imageUrl;
    const imgContent = hasImg
      ? `<img src="${pkg.imageUrl}" alt="${pkg.title}" loading="lazy">`
      : `<i class="fa fa-image"></i>`;
    const registerBtn = pkg.registrationEnabled
      ? `<a href="register.html?package=${encodeURIComponent(pkg.title)}" class="btn-register-pkg">ابدأ التسجيل <i class="fa fa-arrow-left ms-1"></i></a>`
      : `<div class="btn-register-pkg disabled">التسجيل غير متاح حالياً</div>`;
    return `
      <div class="col-sm-6 col-lg-4">
        <div class="pkg-card">
          <div class="pkg-img" onclick="${hasImg ? `openLightbox('${pkg.imageUrl}')` : ''}">
            ${imgContent}
            ${hasImg ? `<div class="overlay"><i class="fa fa-expand"></i></div>` : ''}
          </div>
          <div class="pkg-body">
            <div class="pkg-title">${pkg.title}</div>
            ${pkg.description ? `<div class="pkg-meta">${pkg.description}</div>` : ''}
            ${pkg.price ? `<div class="pkg-price">${pkg.price} <span>ريال</span></div>` : ''}
            ${registerBtn}
          </div>
        </div>
      </div>
    `;
  }

  function openLightbox(src) {
    event.stopPropagation();
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').classList.add('active');
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
    document.getElementById('lightbox-img').src = '';
  }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
</script>
</body>
</html>
