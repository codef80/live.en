<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الإعدادات | Live English</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
  <link href="assets/css/styles.css" rel="stylesheet">

  <style>
    .settings-page{
      padding-top:110px;
      padding-bottom:60px;
      min-height:100vh;
    }
    .settings-head{
      background:linear-gradient(145deg, rgba(255,255,255,.98), rgba(255,248,223,.96));
      border:1px solid rgba(251,199,13,.22);
      border-radius:32px;
      box-shadow:0 22px 48px rgba(88,89,91,.10);
      padding:24px;
      margin-bottom:22px;
    }
    .settings-title{
      font-size:1.9rem;
      font-weight:900;
      color:#58595b;
      margin-bottom:8px;
    }
    .settings-text{
      color:#707176;
      margin:0;
      line-height:1.9;
    }
    .settings-panel{
      background:#fff;
      border:1px solid #efe7cf;
      border-radius:28px;
      box-shadow:0 16px 36px rgba(88,89,91,.08);
      padding:22px;
      margin-bottom:22px;
    }
    .panel-title{
      font-size:1.2rem;
      font-weight:900;
      color:#58595b;
      margin-bottom:16px;
    }
    .settings-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:14px;
    }
    .setting-box{
      background:linear-gradient(180deg, rgba(255,255,255,.98), rgba(255,249,229,.90));
      border:1px solid #efe7cf;
      border-radius:20px;
      padding:16px;
    }
    .setting-key{
      color:#7b7c80;
      font-weight:700;
      margin-bottom:8px;
      font-size:.95rem;
    }
    .setting-value{
      color:#58595b;
      font-weight:900;
      line-height:1.8;
      word-break:break-word;
    }
    .setting-box.full{
      grid-column:1/-1;
    }
    .color-chip{
      width:42px;
      height:42px;
      border-radius:14px;
      border:1px solid rgba(0,0,0,.08);
      display:inline-block;
      vertical-align:middle;
      margin-left:10px;
    }
    .social-list,
    .template-list{
      display:flex;
      flex-direction:column;
      gap:14px;
    }
    .social-item,
    .template-item{
      background:linear-gradient(180deg, rgba(255,255,255,.98), rgba(255,249,229,.90));
      border:1px solid #efe7cf;
      border-radius:20px;
      padding:16px;
    }
    .social-label,
    .template-label{
      color:#7b7c80;
      font-weight:700;
      margin-bottom:8px;
    }
    .social-value,
    .template-value{
      color:#58595b;
      font-weight:900;
      line-height:1.9;
      word-break:break-word;
    }
    .template-value{
      white-space:pre-wrap;
      font-weight:700;
    }
    @media (max-width:767.98px){
      .settings-grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg fixed-top glass-nav">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <span class="brand-badge"><i class="fa-solid fa-language"></i></span>
        <span>Live English</span>
      </a>

      <div class="ms-auto d-flex gap-2">
        <a href="admin.html" class="btn btn-le-outline">
          <i class="fa-solid fa-table-columns"></i>
          لوحة العاملين
        </a>
        <button id="logoutBtn" class="btn btn-le-dark">
          <i class="fa-solid fa-right-from-bracket"></i>
          خروج
        </button>
      </div>
    </div>
  </nav>

  <main class="settings-page">
    <div class="container">
      <div class="settings-head">
        <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3">
          <div>
            <div class="settings-title">الإعدادات</div>
            <p class="settings-text">عرض الإعدادات الحالية للنظام والروابط والقوالب الأساسية.</p>
          </div>
          <div class="d-flex gap-2 flex-wrap">
            <button class="btn btn-le" id="refreshBtn">
              <i class="fa-solid fa-rotate"></i>
              تحديث
            </button>
          </div>
        </div>
      </div>

      <div class="settings-panel">
        <div class="panel-title">إعدادات عامة</div>
        <div class="settings-grid" id="generalSettingsGrid">
          <div class="empty-box">جاري تحميل الإعدادات...</div>
        </div>
      </div>

      <div class="settings-panel">
        <div class="panel-title">الألوان المعتمدة</div>
        <div class="settings-grid" id="colorsGrid">
          <div class="empty-box">جاري تحميل الألوان...</div>
        </div>
      </div>

      <div class="settings-panel">
        <div class="panel-title">روابط السوشيال</div>
        <div class="social-list" id="socialList">
          <div class="empty-box">جاري تحميل الروابط...</div>
        </div>
      </div>

      <div class="settings-panel">
        <div class="panel-title">قوالب رسائل واتساب</div>
        <div class="template-list" id="templatesList">
          <div class="empty-box">جاري تحميل القوالب...</div>
        </div>
      </div>

      <div class="settings-panel">
        <div class="panel-title">روابط Google Drive</div>
        <div class="settings-grid" id="driveGrid">
          <div class="empty-box">جاري تحميل البيانات...</div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="assets/js/config.js"></script>
  <script>
    const API_URL = window.APP_CONFIG.API_URL;
    let currentUser = null;

    document.addEventListener('DOMContentLoaded', async () => {
      guardAuth();
      bindEvents();
      await loadSettingsPage();
    });

    function guardAuth() {
      const raw = localStorage.getItem('liveEnglishStaffUser');
      if (!raw) {
        window.location.href = 'staff-login.html';
        return;
      }

      try {
        currentUser = JSON.parse(raw);
      } catch {
        localStorage.removeItem('liveEnglishStaffUser');
        window.location.href = 'staff-login.html';
      }
    }

    function bindEvents() {
      document.getElementById('refreshBtn').addEventListener('click', loadSettingsPage);
      document.getElementById('logoutBtn').addEventListener('click', logout);
    }

    async function loadSettingsPage() {
      await Promise.all([
        loadInitData(),
        loadDriveOverview()
      ]);
    }

    async function loadInitData() {
      try {
        const res = await fetch(`${API_URL}?action=initData`);
        const json = await res.json();
        const settings = json?.data?.settings || {};

        renderGeneralSettings(settings);
        renderColors(settings);
        renderSocial(settings);
        renderTemplates(settings);
      } catch (e) {
        console.error(e);
        document.getElementById('generalSettingsGrid').innerHTML = '<div class="empty-box">تعذر تحميل الإعدادات.</div>';
        document.getElementById('colorsGrid').innerHTML = '<div class="empty-box">تعذر تحميل الألوان.</div>';
        document.getElementById('socialList').innerHTML = '<div class="empty-box">تعذر تحميل الروابط.</div>';
        document.getElementById('templatesList').innerHTML = '<div class="empty-box">تعذر تحميل القوالب.</div>';
      }
    }

    async function loadDriveOverview() {
      try {
        const res = await fetch(`${API_URL}?action=getDriveMappingOverview`);
        const json = await res.json();
        const data = json?.data || {};
        renderDrive(data);
      } catch (e) {
        console.error(e);
        document.getElementById('driveGrid').innerHTML = '<div class="empty-box">تعذر تحميل روابط Google Drive.</div>';
      }
    }

    function renderGeneralSettings(settings) {
      const target = document.getElementById('generalSettingsGrid');
      const items = [
        ['اسم البرنامج', settings['اسم_البرنامج']],
        ['السنة الحالية', settings['السنة_الحالية']],
        ['تفعيل التسجيل', settings['تفعيل_التسجيل']],
        ['تفعيل بوابة المتابعة', settings['تفعيل_بوابة_المتابعة']],
        ['تفعيل بوابة العاملين', settings['تفعيل_بوابة_العاملين']],
        ['الحد الأقصى لصورة الجواز MB', settings['الحد_الأقصى_لحجم_صورة_الجواز_MB']],
        ['الحد الأقصى للفيديو MB', settings['الحد_الأقصى_لحجم_الفيديو_MB']]
      ];

      target.innerHTML = items.map(([k,v]) => `
        <div class="setting-box">
          <div class="setting-key">${escapeHtml(k)}</div>
          <div class="setting-value">${escapeHtml(v || '—')}</div>
        </div>
      `).join('');
    }

    function renderColors(settings) {
      const target = document.getElementById('colorsGrid');
      const colors = [
        ['اللون الأساسي', settings['اللون_الأساسي']],
        ['اللون الثانوي', settings['اللون_الثانوي']],
        ['اللون المساعد', settings['اللون_المساعد']]
      ];

      target.innerHTML = colors.map(([k,v]) => `
        <div class="setting-box">
          <div class="setting-key">${escapeHtml(k)}</div>
          <div class="setting-value">
            <span class="color-chip" style="background:${escapeHtml(v || '#ffffff')}"></span>
            ${escapeHtml(v || '—')}
          </div>
        </div>
      `).join('');
    }

    function renderSocial(settings) {
      const target = document.getElementById('socialList');
      const items = [
        ['YouTube', settings['رابط_يوتيوب']],
        ['Instagram', settings['رابط_انستغرام']],
        ['X', settings['رابط_X']],
        ['Snapchat', settings['رابط_سناب']]
      ];

      target.innerHTML = items.map(([k,v]) => `
        <div class="social-item">
          <div class="social-label">${escapeHtml(k)}</div>
          <div class="social-value">
            ${v ? `<a href="${escapeHtml(v)}" target="_blank">${escapeHtml(v)}</a>` : '—'}
          </div>
        </div>
      `).join('');
    }

    function renderTemplates(settings) {
      const target = document.getElementById('templatesList');
      const items = [
        ['رسالة القبول الأولي', settings['رسالة_قبول_أولي']],
        ['رسالة تذكير السداد', settings['رسالة_تذكير_السداد']],
        ['رسالة السداد المكتمل', settings['رسالة_السداد_المكتمل']]
      ];

      target.innerHTML = items.map(([k,v]) => `
        <div class="template-item">
          <div class="template-label">${escapeHtml(k)}</div>
          <div class="template-value">${escapeHtml(v || '—')}</div>
        </div>
      `).join('');
    }

    function renderDrive(data) {
      const target = document.getElementById('driveGrid');
      const items = [
        ['المجلد الجذر', data?.root?.url],
        ['مجلد الفئات/الصور', data?.packages?.url],
        ['مجلد السنوات', data?.yearsRoot?.url]
      ];

      target.innerHTML = items.map(([k,v]) => `
        <div class="setting-box ${k === 'المجلد الجذر' ? 'full' : ''}">
          <div class="setting-key">${escapeHtml(k)}</div>
          <div class="setting-value">
            ${v ? `<a href="${escapeHtml(v)}" target="_blank">${escapeHtml(v)}</a>` : '—'}
          </div>
        </div>
      `).join('');
    }

    function logout() {
      localStorage.removeItem('liveEnglishStaffUser');
      window.location.href = 'staff-login.html';
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
  </script>
</body>
</html>
